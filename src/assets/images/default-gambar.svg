<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <!-- Gradasi Latar Belakang Gelap Elegan -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  
  <!-- Latar Belakang -->
  <rect width="800" height="500" fill="url(#bg-gradient)"/>

  <!-- Siluet Pegunungan (Gunung Salak / Pangrango) -->
  <polygon points="0,500 250,250 550,500" fill="#334155" opacity="0.6"/>
  <polygon points="300,500 550,150 800,500" fill="#1e293b" opacity="0.8"/>
  
  <!-- Aksen Biru KujangTrip di Gunung Tengah -->
  <polygon points="150,500 400,200 650,500" fill="#0038FF" opacity="0.15"/>

  <!-- Logo KujangTrip -->
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="52" font-weight="900" fill="#ffffff" text-anchor="middle">
    Kujang<tspan fill="#0038FF" font-style="italic">Trip</tspan>
  </text>
  
  <!-- Garis Pemisah Biru -->
  <line x1="320" y1="255" x2="480" y2="255" stroke="#0038FF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Pesan Error yang Ramah -->
  <text x="400" y="300" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#cbd5e1" text-anchor="middle">
    Gambar Tidak Tersedia
  </text>
  <text x="400" y="335" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Akses ke gambar dibatasi, namun destinasi ini tetap menantimu di Kota Bogor!
  </text>
</svg>
